[tools]
go = "1.26.2"
golangci-lint = "2.11.4"

[tasks.build]
description = "Build statically linked binary"
run = "CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -tags netgo -ldflags='-s -w' -o stubby cmd/main.go"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.test]
description = "Run unit tests"
run = "go test -v -race ./..."

[tasks.integration-test]
description = "Run integration tests via docker compose"
run = """
#!/usr/bin/env bash
set -e
trap 'docker compose --file docker-compose.test.yml down --volumes' EXIT
docker compose --file docker-compose.test.yml up --build --exit-code-from sut
"""

[tasks.image]
description = "Build Docker image"
run = "docker build -t davyj0nes/stubby:latest ."

[tasks.publish]
description = "Push Docker image to registry"
depends = ["image"]
run = [
    "docker push docker.io/davyj0nes/stubby:latest",
]

[tasks.clean]
description = "Remove built binary"
run = "rm -f stubby"
